<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Músicas</title>
    <link rel="stylesheet" href="musicas.css">
</head>
<body>

<div class="musicas-container">

    <h1 class="titulo-musicas">Músicas</h1>

    <div class="categorias">
        <button onclick="filtrarMusicas('todas', this)" class="ativa">Todas</button>
        <button onclick="filtrarMusicas('brasileiras', this)">Brasileiras</button>
        <button onclick="filtrarMusicas('espanholas', this)">Espanholas</button>
        <button onclick="filtrarMusicas('inglesas', this)">Inglesas</button>
    </div>

    <div class="lista-paginada">
        <button id="setaEsquerda" class="seta-pagina" onclick="mudarPagina(-1)">&#10094;</button>

        <div class="lista-musicas" id="listaMusicas"></div>

        <button id="setaDireita" class="seta-pagina" onclick="mudarPagina(1)">&#10095;</button>
    </div>

    <div class="indicador-pagina" id="indicadorPagina"></div>

    <button class="btn-voltar" onclick="voltarPagina()">Voltar</button>
</div>

<!-- POPUP -->
<div id="popupMusica" class="popup-musica">
    <div class="popup-card-musica">

        <h2 id="tituloMusica"></h2>

        <div class="musica-conteudo">

            <div class="letra" id="letraMusica"></div>

            <div class="info-musica">
                <img id="capaMusica" class="capa-musica">
                <p id="autorMusica" class="autor-musica"></p>
                <div id="playerMusica" class="player-container">
                    <audio id="audioMusica" preload="auto"></audio>

                    <div class="player-controls">
                        <button id="btnPlay" class="player-btn">▶</button>
                        <div class="barra-progresso">
                            <div id="progresso"></div>
                        </div>
                    </div>
                    <a id="btnSpotify" href="#" target="_blank" class="btn-spotify">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                        </svg>
                        Ouvir no Spotify
                    </a>
                </div>
            </div>
        </div>
        <button id="btnTraducao" class="btn-traducao" onclick="mostrarTraducao()">Tradução</button>
        <button class="btn-fechar" onclick="fecharPopupMusica()">Fechar</button>
    </div>
</div>

<script src="musicas.js"></script>
</body>
</html>
