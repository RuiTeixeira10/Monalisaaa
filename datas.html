<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Datas especiais</title>
    <link rel="stylesheet" href="datas.css">
</head>
<body>

    <div class="calendario-container">

    <div class="calendario-header">
        <button id="prevMes" class="nav-btn">◀</button>
        <h1 id="mesAno"></h1>
        <button id="nextMes" class="nav-btn">▶</button>
    </div>

    <div class="calendario-grid" id="calendarioGrid"></div>

    <div class="acoes-calendario">
        <button class="btn-adicionar" onclick="abrirFormularioData()">+ Adicionar data</button>
    </div>

    <button class="btn-voltar" onclick="voltarPagina()">Voltar</button>

</div>

<!-- POPUP DA DATA (visualização) -->
<div id="popupData" class="popup-data">
    <div class="popup-card">
        <h2 id="tituloData"></h2>
        <p id="descricaoData" class="descricao-data"></p>
        <div class="botoes-form">
            <button class="btn-editar" onclick="editarDataAtual()">Editar</button>
            <button class="btn-fechar" onclick="fecharPopupData()">Fechar</button>
        </div>
    </div>
</div>

<!-- POPUP DE CRIAÇÃO/EDIÇÃO DE DATA -->
<div id="popupFormulario" class="popup-data">
    <div class="popup-card">
        <h2 id="tituloFormulario">Nova data especial</h2>

        <label class="label-form">Data</label>
        <input type="date" id="inputData" class="input-form">

        <label class="label-form">Título</label>
        <input type="text" id="inputTitulo" class="input-form" placeholder="Ex: O nosso dia ❤️">

        <label class="label-form">Descrição</label>
        <textarea id="inputDescricao" class="input-form textarea-form" rows="4" placeholder="Escreve aqui a memória..."></textarea>

        <div class="botoes-form">
            <button class="btn-fechar" onclick="fecharFormularioData()">Cancelar</button>
            <button class="btn-guardar" onclick="guardarNovaData()">Guardar</button>
        </div>
    </div>
</div>

<script src="datas.js"></script>
</body>
</html>
